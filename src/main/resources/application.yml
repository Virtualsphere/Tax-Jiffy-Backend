server:
  port: 7071

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gst_reconciliation_system
    username: root
    password: Taxjiffy@1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true

jwt:
  secret: your-secret-key-must-be-at-least-32-characters-long
  expiration-ms: 86400000

gstr1:
  api:
    base-url: https://apisandbox.whitebooks.in/gstr1

app:
  excel:
    upload-dir: /home/aditya/uploads/excel